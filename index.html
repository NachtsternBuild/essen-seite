<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Essensplaner</title>
    <!--
      Apply the stored/system theme before first paint to avoid a flash of the
      wrong theme (FOUC). Mirrors ThemeContext: key 'meal_planner_theme',
      values light | dark | system (default system). Kept dependency-free and
      inline so it runs before the stylesheet is applied.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('meal_planner_theme') || 'system';
          var effective =
            stored === 'system'
              ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : stored;
          document.documentElement.setAttribute('data-theme', effective);
          var accent = localStorage.getItem('meal_planner_accent');
          if (accent) document.documentElement.style.setProperty('--accent', accent);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
